name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Family MCP
    runs-on: ubuntu-latest

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      FAMILY_MCP_WORKER_NAME: ${{ vars.FAMILY_MCP_WORKER_NAME }}
      FAMILY_MCP_STATE_KV_NAMESPACE_ID: ${{ vars.FAMILY_MCP_STATE_KV_NAMESPACE_ID }}
      FAMILY_MCP_TOKENS_KV_NAMESPACE_ID: ${{ vars.FAMILY_MCP_TOKENS_KV_NAMESPACE_ID }}
      FAMILY_MCP_RATE_LIMIT_NAMESPACE_ID: ${{ vars.FAMILY_MCP_RATE_LIMIT_NAMESPACE_ID }}
      FAMILY_MCP_WORKERS_DEV: ${{ vars.FAMILY_MCP_WORKERS_DEV }}
      FAMILY_MCP_CUSTOM_DOMAIN: ${{ vars.FAMILY_MCP_CUSTOM_DOMAIN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Generate Wrangler CI config
        run: node scripts/write-wrangler-ci.mjs

      - name: Deploy Worker
        run: pnpm run deploy:ci
